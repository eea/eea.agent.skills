name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build merged skills
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Verify build output
        run: |
          if [ ! -d "skills" ]; then
            echo "ERROR: skills directory not found"
            exit 1
          fi
          echo "Built skills:"
          ls -la skills/

      - name: Package release artifact
        run: |
          zip -r eea-agent-skills-${{ github.ref_name }}.zip skills/
          tar -czf eea-agent-skills-${{ github.ref_name }}.tar.gz skills/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            eea-agent-skills-${{ github.ref_name }}.zip
            eea-agent-skills-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          body: |
            ## EEA Agent Skills ${{ github.ref_name }}

            Pre-built merged skills (upstream + EEA overrides combined).

            ### Quick Install

            ```bash
            # Download and extract
            curl -L -o eea-skills.zip https://github.com/eea/eea.agent.skills/releases/download/${{ github.ref_name }}/eea-agent-skills-${{ github.ref_name }}.zip
            unzip eea-skills.zip

            # Copy desired skill to your agent
            cp skills/docker-expert/SKILL.md ~/.claude/skills/docker-expert/SKILL.md
            ```

            ### Agentget Install

            For [agentget](https://github.com/joeyism/agentget) users, skills are auto-discovered from the `skills/` directory:

            ```bash
            agentget add eea/eea.agent.skills
            ```

            ### What's Included

            Merged `SKILL.md` files with upstream base + EEA-specific overrides.

            ### Build from Source

            See [CONTRIBUTING.md](https://github.com/eea/eea.agent.skills/blob/main/CONTRIBUTING.md) for build instructions.

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eea-agent-skills-build
          path: skills/
          retention-days: 30